<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expert — Textalk</title>
<meta name="description" content="Expertprofiel bij Textalk: kennis over duurzame kleding, gekoppeld aan onze shows.">
<meta property="og:site_name" content="Textalk">
<meta property="og:type" content="profile">
<meta property="og:title" content="Expert — Textalk">
<meta property="og:locale" content="nl_NL">
<meta property="og:image" content="/media/og.png">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='white'/><rect x='6' y='30' width='88' height='40' rx='20' fill='none' stroke='black' stroke-width='6'/></svg>">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>
<script src="assets/cms-config.js"></script>
<script src="assets/cms.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root{--ink:#000;--paper:#fff;--grey-text:#595959;--accent:#FDED79;
    --font-sans:"Archivo","Helvetica Neue",Helvetica,Arial,sans-serif;--font-serif:"Instrument Serif",Georgia,serif;}
  body{font-family:var(--font-sans);color:var(--ink);background:var(--paper);font-size:1.0625rem;line-height:1.55}
  .display{font-weight:700;letter-spacing:-.02em;line-height:.92}
  .h2{font-size:clamp(1.5rem,3vw,2.25rem);line-height:1.1;font-weight:700}
  .h3{font-size:clamp(1.05rem,2vw,1.3rem);line-height:1.2;font-weight:700}
  .meta{font-size:.875rem;line-height:1.4}
  .serif-quote{font-family:var(--font-serif);font-style:italic}
  .btn{display:inline-flex;align-items:center;gap:.5rem;border-radius:999px;padding:14px 28px;font-weight:600;font-size:1rem;transition:all .15s;cursor:pointer;border:1.5px solid var(--ink);line-height:1;text-decoration:none}
  .btn-primary{background:var(--ink);color:var(--paper)}
  .arr{display:inline-block}
  a:focus-visible,button:focus-visible{outline:2px solid var(--ink);outline-offset:2px}
  .logo-pill{display:inline-flex;align-items:baseline;border:2.5px solid currentColor;border-radius:999px;padding:.28em .7em;line-height:1;text-decoration:none}
  .logo-tex{font-weight:800;letter-spacing:-.02em}.logo-talk{font-family:var(--font-serif);font-weight:400}
  .tag{display:inline-flex;align-items:center;border-radius:999px;border:1.5px solid var(--ink);padding:6px 14px;font-weight:500;font-size:.85rem;line-height:1;text-decoration:none;color:var(--ink)}
  .tag:hover{background:var(--ink);color:#fff}
  .hairline{border-top:1px solid var(--ink)}
  .ph-people{position:absolute;inset:0;background:radial-gradient(circle at 50% 40%, rgba(0,0,0,.14) 0 22%, transparent 23%),linear-gradient(0deg,rgba(0,0,0,.08),rgba(0,0,0,.08))}
  .bio p{margin:0 0 1rem}
  .skip{position:absolute;left:-9999px;top:0;background:var(--ink);color:#fff;padding:12px 20px;border-radius:0 0 12px 0;z-index:100}
  .skip:focus{left:0}
</style>
</head>
<body>
<a class="skip" href="#main">Naar inhoud</a>

<header class="sticky top-0 z-50 bg-white" style="border-bottom:1px solid var(--ink)">
  <div class="mx-auto flex items-center justify-between px-5 md:px-10" style="max-width:1280px;height:72px">
    <a href="index.html" class="logo-pill text-xl"><span class="logo-tex">tex</span><span class="logo-talk">talk</span></a>
    <nav class="flex items-center gap-4 md:gap-6 overflow-x-auto" aria-label="Hoofdnavigatie">
      <a class="font-medium hover:opacity-60" href="textalk-project-tilburg-weeft-verder.html">Tilburg Weeft Verder</a>
      <a class="font-medium hover:opacity-60" href="textalk-talkshows-overzicht.html">Talkshows</a>
      <a class="font-medium" style="border-bottom:2px solid var(--ink);padding-bottom:2px" href="textalk-expert-profiel.html">Experts</a>
      <a class="font-medium hover:opacity-60" href="nieuws.html">Nieuws</a>
      <a class="font-medium hover:opacity-60" href="index.html#/over">Over ons</a>
      <a class="font-medium hover:opacity-60" href="index.html#/partners">Partners</a>
      <a class="btn btn-primary" href="agenda.html">Kom langs</a>
    </nav>
  </div>
</header>

<main id="main">
  <div class="mx-auto px-5 py-24 text-center" style="max-width:760px">
    <p class="meta font-semibold" style="color:var(--grey-text)">Profiel laden…</p>
  </div>
</main>

<footer style="background:var(--ink);color:var(--paper)">
  <div class="mx-auto px-5 py-14 md:px-10" style="max-width:1280px">
    <div class="flex flex-wrap items-baseline gap-4"><span class="logo-pill text-2xl"><span class="logo-tex">tex</span><span class="logo-talk">talk</span></span><span class="font-semibold">deep dive into fashion</span></div>
    <div class="mt-12 flex flex-wrap items-center justify-between gap-4 pt-6" style="border-top:1px solid rgba(255,255,255,.2)">
      <p class="serif-quote text-lg">Onze redactie bepaalt de inhoud — nooit onze financiers.</p>
      <p class="meta">Stichting Textalk · Tilburg · hallo@textalk.nl</p>
    </div>
  </div>
</footer>

<script>
(async function(){
  const esc=TextalkCMS.esc, md=TextalkCMS.mdToHtml, safe=TextalkCMS.safeUrl;
  const slug=new URLSearchParams(location.search).get('slug');
  const main=document.getElementById('main');
  function nf(){return '<div class="mx-auto px-5 py-24 text-center" style="max-width:760px"><h1 class="h2">Expert niet gevonden</h1><a class="btn btn-primary mt-8" href="textalk-expert-profiel.html">Alle experts →</a></div>';}
  if(!slug){main.innerHTML=nf();return;}
  let e;
  try{ e=await TextalkCMS.get('experts',slug); }catch(err){ main.innerHTML=nf(); return; }

  document.title=(e.naam||'Expert')+' — Textalk';
  const links=[];
  if(safe(e.website))links.push('<a class="tag" rel="noopener" href="'+safe(e.website)+'">Website ↗</a>');
  if(safe(e.linkedin))links.push('<a class="tag" rel="noopener" href="'+safe(e.linkedin)+'">LinkedIn ↗</a>');

  main.innerHTML=`
  <div class="mx-auto grid gap-10 px-5 py-14 md:grid-cols-12 md:px-10 md:py-20" style="max-width:1280px">
    <div class="md:col-span-4">
      <a href="textalk-expert-profiel.html" class="meta font-semibold inline-block mb-6">← Alle experts</a>
      <div class="relative aspect-[4/5] overflow-hidden" style="background:var(--accent);border:1px solid var(--ink)">
        ${e.portret?'<img loading="lazy" src="'+esc(e.portret)+'" alt="'+esc(e.naam)+'" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover">':'<div class="ph-people"></div>'}
      </div>
      ${links.length?'<div class="mt-5 flex flex-wrap gap-2">'+links.join('')+'</div>':''}
    </div>
    <div class="md:col-span-8">
      <p class="meta font-semibold uppercase tracking-wide" style="color:var(--grey-text)">${esc(e.rol||'Expert')}</p>
      <h1 class="display mt-2" style="font-size:clamp(2rem,4vw,3rem)">${esc(e.naam||'')}</h1>
      ${e.citaat?'<p class="serif-quote mt-4 text-xl" style="color:var(--grey-text)">\u201C'+esc(e.citaat)+'\u201D</p>':''}
      ${e.oneliner?'<p class="mt-4 text-lg font-semibold">'+esc(e.oneliner)+'</p>':''}
      <div class="bio mt-6 text-lg">${md(e.bio||'')}</div>
      ${e.show?`<div class="mt-8"><p class="meta font-semibold uppercase tracking-wide" style="color:var(--grey-text)">Te gast bij</p>
        <div class="mt-3"><a href="textalk-talkshows-overzicht.html" class="inline-flex items-center gap-3 pl-2 pr-4 py-2 rounded-full" style="border:1px solid var(--ink)">
        <span class="w-6 h-6 rounded-full" style="background:var(--accent)"></span><span class="font-semibold">${esc(e.show)}</span></a></div></div>`:''}
      ${e.contact_ok===true||e.contact_ok==='true'?`
      <div class="mt-10 p-6 flex flex-wrap items-center justify-between gap-4" style="background:var(--ink);color:#fff">
        <div><p class="h3">Deze expert spreken?</p><p class="meta text-white/70 mt-1">We brengen je graag in contact — voor pers, onderzoek of een evenement.</p></div>
        <a class="btn" style="background:#fff;color:#000;border-color:#fff" href="mailto:hallo@textalk.nl?subject=Contact met ${encodeURIComponent(e.naam||'expert')}">Neem contact op <span class="arr">→</span></a>
      </div>
      <p class="meta mt-4" style="color:var(--grey-text)">We delen contactgegevens alleen met toestemming van de expert.</p>`:''}
    </div>
  </div>`;
})();
</script>
</body>
</html>
