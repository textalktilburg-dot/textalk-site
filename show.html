<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Show — Textalk</title>
<meta property="og:image" content="/media/og.png">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='white'/><rect x='6' y='30' width='88' height='40' rx='20' fill='none' stroke='black' stroke-width='6'/></svg>">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>
<script src="assets/cms-config.js"></script>
<script src="assets/cms.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root{--ink:#000;--paper:#fff;--grey-text:#595959;--accent:#E5ABFF;
    --font-sans:"Archivo","Helvetica Neue",Helvetica,Arial,sans-serif;--font-serif:"Instrument Serif",Georgia,serif;}
  html{scroll-behavior:smooth}
  body{font-family:var(--font-sans);color:var(--ink);background:var(--paper);font-size:1.0625rem;line-height:1.55}
  .display{font-weight:700;letter-spacing:-.02em;line-height:.92}
  .h2{font-size:clamp(1.5rem,3vw,2.25rem);line-height:1.1;font-weight:700}
  .h3{font-size:clamp(1.05rem,2vw,1.3rem);line-height:1.2;font-weight:700}
  .meta{font-size:.875rem;line-height:1.4}
  .serif{font-family:var(--font-serif)}.serif-quote{font-family:var(--font-serif);font-style:italic}
  .btn{display:inline-flex;align-items:center;gap:.5rem;border-radius:999px;padding:14px 28px;font-weight:600;font-size:1rem;transition:all .15s;cursor:pointer;border:1.5px solid var(--ink);line-height:1;text-decoration:none}
  .btn-primary{background:var(--ink);color:var(--paper)}.btn-primary:hover{transform:scale(1.03)}
  .arr{display:inline-block;transition:transform .15s}
  a:focus-visible,button:focus-visible{outline:2px solid var(--ink);outline-offset:2px}
  .logo-pill{display:inline-flex;align-items:baseline;border:2.5px solid currentColor;border-radius:999px;padding:.28em .7em;line-height:1;text-decoration:none}
  .logo-tex{font-weight:800;letter-spacing:-.02em}.logo-talk{font-family:var(--font-serif);font-weight:400}
  .tag{display:inline-flex;align-items:center;border-radius:999px;border:1.5px solid var(--ink);padding:6px 14px;font-weight:500;font-size:.875rem;line-height:1}
  .hairline{border-top:1px solid var(--ink)}
  .ph-people{position:absolute;inset:0;background:radial-gradient(circle at 50% 40%, rgba(0,0,0,.14) 0 22%, transparent 23%),linear-gradient(0deg,rgba(0,0,0,.08),rgba(0,0,0,.08))}
  .poster-row{display:flex;justify-content:space-between;gap:1rem;font-weight:600;font-size:.85rem}
  .acc{border-bottom:1px solid var(--ink)}.acc:first-child{border-top:1px solid var(--ink)}
  .acc-head{width:100%;display:flex;align-items:center;justify-content:space-between;gap:1rem;padding:1.1rem 0;text-align:left;background:none;cursor:pointer;font-weight:700;font-size:clamp(1.02rem,2vw,1.25rem)}
  .acc-num{font-family:var(--font-serif);font-style:italic;font-size:1.35rem;margin-right:.9rem;color:var(--grey-text)}
  .acc-icon{flex-shrink:0;width:28px;height:28px;border-radius:999px;border:1.5px solid var(--ink);display:flex;align-items:center;justify-content:center;transition:transform .2s}
  .acc.open .acc-icon{transform:rotate(45deg);background:var(--accent)}
  .acc-body{max-height:0;overflow:hidden;transition:max-height .3s ease-out}
  .acc-body-inner{padding:0 0 1.4rem 2.5rem}
  .credit{display:flex;flex-direction:column;gap:.15rem}
  .credit .role{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--grey-text)}
  .heroscrib{position:absolute;inset:0;width:100%;height:100%}
  @media(prefers-reduced-motion:reduce){.acc-body,.btn,.arr{transition:none!important}}
</style>
</head>
<body>

<header class="sticky top-0 z-50 bg-white" style="border-bottom:1px solid var(--ink)">
  <div class="mx-auto flex items-center justify-between px-5 md:px-10" style="max-width:1280px;height:72px">
    <a href="index.html" class="logo-pill text-xl"><span class="logo-tex">tex</span><span class="logo-talk">talk</span></a>
    <nav class="flex items-center gap-4 md:gap-6 overflow-x-auto">
      <a class="font-medium hover:opacity-60" href="textalk-project-tilburg-weeft-verder.html">Tilburg Weeft Verder</a>
      <a class="font-medium" style="border-bottom:2px solid var(--ink);padding-bottom:2px" href="textalk-talkshows-overzicht.html">Talkshows</a>
      <a class="font-medium hover:opacity-60" href="textalk-expert-profiel.html">Experts</a>
      <a class="font-medium hover:opacity-60" href="nieuws.html">Nieuws</a>
      <a class="font-medium hover:opacity-60" href="index.html#/over">Over ons</a>
      <a class="font-medium hover:opacity-60" href="index.html#/partners">Partners</a>
      <a class="btn btn-primary" href="agenda.html">Kom langs</a>
    </nav>
  </div>
</header>

<main id="page">
  <div class="mx-auto px-5 py-24 text-center" style="max-width:760px">
    <p class="meta font-semibold" style="color:var(--grey-text)">Show laden…</p>
  </div>
</main>

<footer style="background:var(--ink);color:var(--paper)">
  <div class="mx-auto px-5 py-14 md:px-10" style="max-width:1280px">
    <div class="flex flex-wrap items-baseline gap-4"><span class="logo-pill text-2xl"><span class="logo-tex">tex</span><span class="logo-talk">talk</span></span><span class="font-semibold">deep dive into fashion</span></div>
    <div class="mt-12 flex flex-wrap items-center justify-between gap-4 pt-6" style="border-top:1px solid rgba(255,255,255,.2)">
      <p class="serif-quote text-lg">Onze redactie bepaalt de inhoud — nooit onze financiers.</p>
      <p class="meta">Stichting Textalk · Tilburg · hallo@textalk.nl</p>
    </div>
  </div>
</footer>

<script>
(async function(){
  const esc = TextalkCMS.esc, md = TextalkCMS.mdToHtml, safe = TextalkCMS.safeUrl;
  const slug = new URLSearchParams(location.search).get('slug');
  const page = document.getElementById('page');
  if(!slug){ page.innerHTML = notFound(); return; }
  let s;
  try { s = await TextalkCMS.get('shows', slug); }
  catch(e){ page.innerHTML = notFound(); return; }

  const kleur = s.kleur || '#E5ABFF';
  document.documentElement.style.setProperty('--accent', kleur);
  document.title = s.title + ' — Textalk';

  const takeaways = (s.takeaways||[]).map((t,i)=>`
    <div class="acc${i===0?' open':''}">
      <button class="acc-head"><span><span class="acc-num">${String(i+1).padStart(2,'0')}</span>${esc(t.kop)}</span><span class="acc-icon">+</span></button>
      <div class="acc-body"><div class="acc-body-inner"><p>${esc(t.uitleg)}</p></div></div>
    </div>`).join('');

  const sprekers = (s.sprekers||[]).map(sp=>`
    <div><div class="relative aspect-[4/5] overflow-hidden" style="background:${kleur};border:1px solid var(--ink)"><div class="ph-people"></div></div>
    <p class="font-semibold mt-3 leading-tight">${esc(sp.naam)}</p><p class="meta" style="color:var(--grey-text)">${esc(sp.rol||'')}</p></div>`).join('');

  const bronnen = (s.bronnen||[]).map(b=>`
    <li class="pl-4" style="border-left:3px solid ${kleur}">${safe(b.link)?`<a class="hover:underline" style="text-underline-offset:3px" href="${safe(b.link)}" rel="noopener">${esc(b.titel)}</a>`:esc(b.titel)}</li>`).join('');

  const credits = (s.credits||[]).map(c=>`
    <div class="credit"><span class="role">${esc(c.rol)}</span><span class="h3">${esc(c.naam)}</span></div>`).join('');

  page.innerHTML = `
  <section class="relative overflow-hidden" style="background:${kleur}">
    <svg class="heroscrib" viewBox="0 0 1280 640" preserveAspectRatio="xMidYMid slice" aria-hidden="true" id="heroScrib"></svg>
    <div class="relative mx-auto px-5 pt-6 pb-14 md:px-10 md:pb-20" style="max-width:1280px">
      <div class="poster-row"><span>${esc(s.title)}</span><span class="hidden sm:block">Deep dive into fashion</span><span>${esc(s.datum||'')}</span></div>
      <a href="textalk-talkshows-overzicht.html" class="meta font-semibold inline-block mt-8">← Alle shows</a>
      <h1 class="display mt-6" style="font-size:clamp(2.4rem,7vw,5.5rem)">${esc(s.title)}</h1>
      ${s.ondertitel?`<p class="serif mt-5" style="font-size:clamp(1.3rem,3vw,2rem);line-height:1.2">${esc(s.ondertitel)}</p>`:''}
      <div class="mt-8 flex flex-wrap items-center gap-3">
        ${s.thema?`<span class="tag">${esc(s.thema)}</span>`:''}
        ${s.locatie?`<span class="tag" style="background:rgba(255,255,255,.6)">${esc(s.locatie)}</span>`:''}
      </div>
    </div>
  </section>

  <section class="hairline bg-white">
    <div class="mx-auto grid gap-px px-0 md:grid-cols-4" style="max-width:1280px;background:var(--ink);border-left:1px solid var(--ink);border-right:1px solid var(--ink)">
      <div class="bg-white p-6"><p class="meta font-semibold uppercase tracking-wide" style="color:var(--grey-text)">Datum</p><p class="h3 mt-1">${esc(s.datum||'—')}</p></div>
      <div class="bg-white p-6"><p class="meta font-semibold uppercase tracking-wide" style="color:var(--grey-text)">Locatie</p><p class="h3 mt-1">${esc(s.locatie||'—')}</p></div>
      <div class="bg-white p-6"><p class="meta font-semibold uppercase tracking-wide" style="color:var(--grey-text)">Thema</p><p class="h3 mt-1">${esc(s.thema||'—')}</p></div>
      <div class="bg-white p-6"><p class="meta font-semibold uppercase tracking-wide" style="color:var(--grey-text)">Terugkijken</p><p class="h3 mt-1">${safe(s.video)?`<a href="${safe(s.video)}" rel="noopener" class="underline" style="text-underline-offset:3px">Naar de video →</a>`:'Volgt'}</p></div>
    </div>
  </section>

  <section class="hairline bg-white">
    <div class="mx-auto grid gap-10 px-5 py-16 md:grid-cols-12 md:px-10 md:py-20" style="max-width:1280px">
      <div class="md:col-span-4"><h2 class="h2">Waar ging het over</h2></div>
      <div class="md:col-span-8 space-y-5 text-lg">${md(s.omschrijving||s.body||'')}</div>
    </div>
  </section>

  ${takeaways?`<section class="hairline bg-white"><div class="mx-auto px-5 py-16 md:px-10" style="max-width:900px">
    <h2 class="h2">De takeaways</h2><p class="mt-3 mb-8" style="color:var(--grey-text)">De kern van de avond. Klik open wat je wilt weten.</p>
    <div id="acc">${takeaways}</div></div></section>`:''}

  ${sprekers?`<section class="hairline bg-white"><div class="mx-auto px-5 py-16 md:px-10" style="max-width:1280px">
    <div class="flex flex-wrap items-end justify-between gap-4 mb-8">
      <div><p class="meta font-semibold uppercase tracking-wide" style="color:var(--grey-text)">Wie er aan tafel zat</p><h2 class="h2 mt-1">Sprekers & experts</h2></div>
      <a class="font-semibold" href="textalk-expert-profiel.html">Alle experts <span class="arr">→</span></a></div>
    <div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-4">${sprekers}</div></div></section>`:''}

  ${credits?`<section class="hairline" style="background:${kleur}"><div class="mx-auto px-5 py-16 md:px-10 md:py-20" style="max-width:1280px">
    <p class="meta font-semibold uppercase tracking-wide">Gemaakt door</p><h2 class="h2 mt-1">Het team achter ${esc(s.title)}</h2>
    <div class="mt-10 grid gap-x-8 gap-y-8 sm:grid-cols-2 lg:grid-cols-3">${credits}</div></div></section>`:''}

  ${bronnen?`<section class="hairline" style="background:var(--ink);color:var(--paper)"><div class="mx-auto px-5 py-16 md:px-10 md:py-20" style="max-width:1280px">
    <h2 class="h2">Bronnen bij deze show</h2>
    <p class="mt-3 max-w-2xl text-white/80">Alles wat op het podium beweerd is, kun je nalezen. Zo werken wij: geen claim zonder bron.</p>
    <ul class="mt-8 space-y-3 max-w-3xl">${bronnen}</ul></div></section>`:''}
  `;

  function notFound(){return '<div class="mx-auto px-5 py-24 text-center" style="max-width:760px"><h1 class="h2">Show niet gevonden</h1><p class="mt-4" style="color:var(--grey-text)">Misschien is de link verouderd.</p><a class="btn btn-primary mt-8" href="textalk-talkshows-overzicht.html">Alle shows →</a></div>';}

  // accordion
  document.querySelectorAll('.acc-head').forEach(h=>h.addEventListener('click',()=>{
    const a=h.parentElement,b=h.nextElementSibling,o=a.classList.contains('open');
    if(o){a.classList.remove('open');b.style.maxHeight=null;}else{a.classList.add('open');b.style.maxHeight=b.scrollHeight+'px';}
  }));
  const f=document.querySelector('.acc.open .acc-body');if(f)f.style.maxHeight=f.scrollHeight+'px';

  // scribble-web
  const svg=document.getElementById('heroScrib');
  if(svg){const ns='http://www.w3.org/2000/svg',N=44,pts=[];
    for(let i=0;i<N;i++)pts.push([1280*(0.35+Math.random()*0.65),640*Math.random()]);
    const g=document.createElementNS(ns,'g');g.setAttribute('stroke','#fff');g.setAttribute('stroke-width','.6');g.setAttribute('fill','none');g.setAttribute('opacity','.85');
    for(let i=0;i<N;i++){pts.map((p,j)=>[j,Math.hypot(p[0]-pts[i][0],p[1]-pts[i][1])]).sort((a,b)=>a[1]-b[1]).slice(1,5)
      .forEach(([j])=>{const l=document.createElementNS(ns,'line');l.setAttribute('x1',pts[i][0]|0);l.setAttribute('y1',pts[i][1]|0);l.setAttribute('x2',pts[j][0]|0);l.setAttribute('y2',pts[j][1]|0);g.appendChild(l);});}
    svg.appendChild(g);}
})();
</script>
</body>
</html>
